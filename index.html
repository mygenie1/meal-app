<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA 기본 -->
    <meta name="theme-color" content="#6b4f3a" />
    <meta name="description" content="함께 먹는 순간을 기록해요" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="식탁일기" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- 파비콘 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />

    <title>식탁일기</title>

    <!-- 카카오맵 SDK: https 명시 (// 프로토콜 상대 URL은 Mixed Content 오류 유발) -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=%VITE_KAKAO_MAP_KEY%&libraries=services&autoload=false"></script>

    <!-- 카카오 SDK 로드 확인 로그 -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        console.log('[Kakao] DOMContentLoaded — kakao:', typeof window.kakao, '| maps:', typeof window.kakao?.maps, '| load fn:', typeof window.kakao?.maps?.load)
      })
      window.addEventListener('load', function () {
        console.log('[Kakao] window.load — kakao:', typeof window.kakao, '| maps:', typeof window.kakao?.maps, '| Map:', typeof window.kakao?.maps?.Map)
      })
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
