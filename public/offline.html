<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6b4f3a" />
    <title>오프라인 — 식탁일기</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Noto Sans KR', system-ui, sans-serif;
        background: #fdfcf9;
        color: #3d2b1f;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }

      .icon-wrap {
        width: 80px;
        height: 80px;
        background: #f5ede0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }

      svg { display: block; }

      h1 {
        font-size: 1.125rem;
        font-weight: 700;
        color: #3d2b1f;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 0.875rem;
        color: #a07850;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      button {
        background: #6b4f3a;
        color: #fdfcf9;
        border: none;
        border-radius: 9999px;
        padding: 0.75rem 2rem;
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover { background: #3d2b1f; }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="icon-wrap">
      <!-- 와이파이 끊김 아이콘 -->
      <svg width="36" height="36" fill="none" stroke="#a07850" stroke-width="1.6"
           stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M1 6C5 2 10.5 1 15 2.5M19 5c1 .9 1.9 2 2.5 3.2"/>
        <path d="M5 10c1.8-1.8 4.2-2.8 6.8-2.8M17 9.5c.6.5 1.2 1.1 1.6 1.8"/>
        <path d="M9 14a4 4 0 0 1 5.3-.5"/>
        <circle cx="12" cy="18" r="1" fill="#a07850" stroke="none"/>
        <line x1="3" y1="3" x2="21" y2="21" stroke="#d9c4a8" stroke-width="1.4"/>
      </svg>
    </div>

    <h1>인터넷 연결을 확인해주세요</h1>
    <p>
      네트워크에 연결되어 있지 않아요.<br />
      연결 후 다시 시도해주세요.
    </p>

    <button onclick="location.reload()">다시 시도</button>
  </body>
</html>
